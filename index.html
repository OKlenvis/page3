<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Perfil</title>
    <!-- Vinculando o CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

    </div>

</body>
